name: PR Build and Test Check

on:
  pull_request:
    branches:
      - main
      - dev

# Set the absolute minimum permissions for the GITHUB_TOKEN
permissions:
  contents: read # Required to checkout the code
  packages: read # Required if you pull dependencies from GitHub Packages

jobs:
  build_for_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
          build-scan-publish: false
          # Keep read-only to prevent cache poisoning from PRs
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Both Variant (onlinePreview/offlinePreview)
        # Use GITHUB_TOKEN only if strictly necessary for fetching packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleOnlinePreviewDebug assembleOfflinePreviewDebug -PAPP_ID="com.rosan.installer.x.revived.test"

      - name: Upload Online Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pr-online-debug-apk-${{ github.event.pull_request.head.sha }}
          path: app/build/outputs/apk/onlinePreview/debug/*.apk
          retention-days: 7
          archive: false

      - name: Upload Offline Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pr-offline-debug-apk-${{ github.event.pull_request.head.sha }}
          path: app/build/outputs/apk/offlinePreview/debug/*.apk
          retention-days: 7
          archive: false
