name: Dev Branch Build & Artifact

on:
  push:
    branches-ignore:
      - 'main'
      - 'weblate-dev'
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/auto-preview-dev.yml'

jobs:
  pre_job:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # Core parameter: skip if an identical commit has already succeeded
          skip_after_successful_duplicate: 'true'
          # Optional: cancel concurrent runs? 'never' = keep both running (good for dev merges)
          concurrent_skipping: 'never'
          # Optional: ignore certain paths (usually handled in on.push.paths)
          do_not_skip: '[]'

  build_and_upload_artifact:
    needs: pre_job
    # Run only if should_skip is not true and commit message does not contain [skip dev]
    if: |
      needs.pre_job.outputs.should_skip != 'true' &&
      !contains(github.event.head_commit.message, '[skip dev]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit short SHA
        id: commit_sha
        run: echo "SHORT_SHA=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Accept the terms of use to suppress the caching licensing warning
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
          build-scan-publish: false
          # Allow writing to cache for dev branch
          cache-read-only: ${{ github.ref_name != 'dev' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode and set up signing key
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            exit 0
          fi
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Build Dev Release APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleOnlineUnstableRelease assembleOfflineUnstableRelease

      # Upload the online variant unzipped APK
      - name: Upload Online APK
        uses: actions/upload-artifact@v7
        with:
          name: dev-online-apk-${{ steps.commit_sha.outputs.SHORT_SHA }}
          path: app/build/outputs/apk/onlineUnstable/release/*.apk
          retention-days: 15
          archive: false

      # Upload the offline variant unzipped APK
      - name: Upload Offline APK
        uses: actions/upload-artifact@v7
        with:
          name: dev-offline-apk-${{ steps.commit_sha.outputs.SHORT_SHA }}
          path: app/build/outputs/apk/offlineUnstable/release/*.apk
          retention-days: 15
          archive: false